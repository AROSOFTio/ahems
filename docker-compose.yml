services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: ahems_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ahems_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CLIENT_PUBLIC_URL: ${CLIENT_PUBLIC_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: mysql:8.0
    container_name: ahems_db
    restart: unless-stopped
    profiles:
      - local-db
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_HOST_PORT}:3306"
    volumes:
      - ahems_mysql_data:/var/lib/mysql
      - ./database/schema/001_ahems_schema.sql:/docker-entrypoint-initdb.d/001_ahems_schema.sql:ro
      - ./database/seed/001_seed_roles_and_demo.sql:/docker-entrypoint-initdb.d/002_seed_roles_and_demo.sql:ro
      - ./docker/mysql/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: ahems_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  ahems_mysql_data:
